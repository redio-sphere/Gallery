<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="Redio_black.png" type="image/png">
<meta charset="UTF-8">
<title>Redio</title>

<style>
  body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 40px;
  }

  /* Base button */
  .neon-btn {
    padding: 20px 60px;
    font-size: 24px;
    background: transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  /* 🔵 Blue Neon */
  .blue {
    color: #00f0ff;
    border: 3px solid #00f0ff;
    text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
    box-shadow: 0 0 10px #00f0ff, inset 0 0 10px #00f0ff;
  }

  .blue:hover {
    background: #00f0ff;
    color: #000;
    box-shadow:
      0 0 20px #00f0ff,
      0 0 40px #00f0ff,
      0 0 80px #00f0ff;
  }

  /* 🔴 Red Neon */
  .red {
    color: #ff2e2e;
    border: 3px solid #ff2e2e;
    text-shadow: 0 0 10px #ff2e2e, 0 0 20px #ff2e2e;
    box-shadow: 0 0 10px #ff2e2e, inset 0 0 10px #ff2e2e;
  }

  .red:hover {
    background: #ff2e2e;
    color: #000;
    box-shadow:
      0 0 20px #ff2e2e,
      0 0 40px #ff2e2e,
      0 0 80px #ff2e2e;
  }

  /* Click effect */
  .neon-btn:active {
    transform: scale(0.95);
  }
  .glitch-container {
  position: relative;
  display: inline-block;
}

.glitch-img {
  width: 200px; /* adjust size */
  position: relative;
}

/* Duplicate layers using pseudo effect */
.glitch-container::before,
.glitch-container::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 200px;
  height: 100%;
  background: url('logo.png') no-repeat center/contain;
  opacity: 0.7;
}

/* Red glitch */
.glitch-container::before {
  animation: glitch1 0.5s infinite;
  transform: translate(2px, -2px);
  filter: drop-shadow(-2px 0 red);
}

/* Blue glitch */
.glitch-container::after {
  animation: glitch2 0.5s infinite;
  transform: translate(-2px, 2px);
  filter: drop-shadow(2px 0 cyan);
}

/* Animations */
@keyframes glitch1 {
  0% { clip-path: inset(10% 0 85% 0); }
  20% { clip-path: inset(40% 0 40% 0); }
  40% { clip-path: inset(80% 0 5% 0); }
  60% { clip-path: inset(20% 0 60% 0); }
  80% { clip-path: inset(50% 0 20% 0); }
  100% { clip-path: inset(10% 0 85% 0); }
}

@keyframes glitch2 {
  0% { clip-path: inset(80% 0 5% 0); }
  20% { clip-path: inset(20% 0 60% 0); }
  40% { clip-path: inset(50% 0 20% 0); }
  60% { clip-path: inset(10% 0 85% 0); }
  80% { clip-path: inset(40% 0 40% 0); }
  100% { clip-path: inset(80% 0 5% 0); }
}

</style>

</head>
<body>
<div class="glitch-container">
  <img src="r1.png" class="glitch-img">
</div>

<button class="neon-btn blue" onclick="window.open('index.html')">POSTERS</button>
<button class="neon-btn red" onclick="window.open('gallery.html')">PHOTOS</button>

</body>
</html>

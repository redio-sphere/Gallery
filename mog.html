<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="Redio_black.png" type="image/png">
<meta charset="UTF-8">
<title>Redio</title>

<style>
  body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 40px;
  }

  /* Base button */
  .neon-btn {
    padding: 20px 60px;
    font-size: 24px;
    background: transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  /* 🔵 Blue Neon */
  .blue {
    color: #00f0ff;
    border: 3px solid #00f0ff;
    text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
    box-shadow: 0 0 10px #00f0ff, inset 0 0 10px #00f0ff;
  }

  .blue:hover {
    background: #00f0ff;
    color: #000;
    box-shadow:
      0 0 20px #00f0ff,
      0 0 40px #00f0ff,
      0 0 80px #00f0ff;
  }

  /* 🔴 Red Neon */
  .red {
    color: #ff2e2e;
    border: 3px solid #ff2e2e;
    text-shadow: 0 0 10px #ff2e2e, 0 0 20px #ff2e2e;
    box-shadow: 0 0 10px #ff2e2e, inset 0 0 10px #ff2e2e;
  }

  .red:hover {
    background: #ff2e2e;
    color: #000;
    box-shadow:
      0 0 20px #ff2e2e,
      0 0 40px #ff2e2e,
      0 0 80px #ff2e2e;
  }

  /* Click effect */
  .neon-btn:active {
    transform: scale(0.95);
  }

 .glitch {
  position: relative;
  width: 250px; /* adjust */
  }
  
  .glitch img {
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }
  
  /* Base image */
  .glitch img:nth-child(1) {
    position: relative;
  }
  
  /* Red layer */
  .glitch img:nth-child(2) {
    transform: translate(3px, -3px);
    filter: drop-shadow(-3px 0 red);
    animation: glitch1 0.4s infinite;
    opacity: 0.8;
  }
  
  /* Blue layer */
  .glitch img:nth-child(3) {
    transform: translate(-3px, 3px);
    filter: drop-shadow(3px 0 cyan);
    animation: glitch2 0.4s infinite;
    opacity: 0.8;
  }
  
  /* Animations */
  @keyframes glitch1 {
    0% { clip-path: inset(10% 0 80% 0); }
    25% { clip-path: inset(40% 0 30% 0); }
    50% { clip-path: inset(70% 0 10% 0); }
    75% { clip-path: inset(20% 0 60% 0); }
    100% { clip-path: inset(10% 0 80% 0); }
  }
  
  @keyframes glitch2 {
    0% { clip-path: inset(70% 0 10% 0); }
    25% { clip-path: inset(20% 0 60% 0); }
    50% { clip-path: inset(50% 0 20% 0); }
    75% { clip-path: inset(10% 0 80% 0); }
    100% { clip-path: inset(70% 0 10% 0); }
  }
</style>

</head>
<body>
<div class="glitch">
  <img src="r1.png" alt="logo">
  <img src="r1.png" alt="logo">
  <img src="r1.png" alt="logo">
</div>

<button class="neon-btn blue" onclick="window.open('index.html')">POSTERS</button>
<button class="neon-btn red" onclick="window.open('gallery.html')">PHOTOS</button>

</body>
</html>

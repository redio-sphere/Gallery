<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link rel="icon" href="Redio_black.png" type="image/png">
<meta charset="UTF-8">
<title>Redio</title>

<style>

  body {
    background: #d9d9d9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 40px;
            // <weight>: Use a value from 200 to 700
      // <uniquifier>: Use a unique and descriptive class name
      
      .oswald-<uniquifier> {
        font-family: "Oswald", sans-serif;
        font-optical-sizing: auto;
        font-weight: <weight>;
        font-style: normal;
      }
  }

  /* Base button */
  .neon-btn {
    padding: 20px 60px;
    font-size: 24px;
    background: transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  /* 🔵 Blue Neon */
  .blue {
    color: #cbad8d;
    border: 3px solid #cbad8d;
    text-shadow: 0 0 10px #cbad8d, 0 0 20px #cbad8d;
    box-shadow: 0 0 10px #cbad8d, inset 0 0 10px #cbad8d;
  }

  .blue:hover {
    background: #cbad8d;
    color: #000;
    box-shadow:
      0 0 20px #cbad8d,
      0 0 40px #cbad8d,
      0 0 80px #cbad8d;
  }

  /* 🔴 Red Neon */
  .red {
    color: #a85d5d;
    border: 3px solid #a85d5d;
    text-shadow: 0 0 10px #a85d5d, 0 0 20px #a85d5d;
    box-shadow: 0 0 10px #a85d5d, inset 0 0 10px #a85d5d;
  }

  .red:hover {
    background: #a85d5d;
    color: #000;
    box-shadow:
      0 0 20px #a85d5d,
      0 0 40px #a85d5d,
      0 0 80px #a85d5d;
  }

  /* Click effect */
  .neon-btn:active {
    transform: scale(0.95);
  }

 .glitch {
  position: relative;
  width: 250px; /* adjust */
  }
  
  .glitch img {
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }
  
  /* Base image */
  .glitch img:nth-child(1) {
    position: relative;
  }
  
  /* Red layer */
  .glitch img:nth-child(2) {
    transform: translate(3px, -3px);
    filter: drop-shadow(-3px 0 red);
    animation: glitch1 1.3s infinite steps(2, end);  /* updated */
    opacity: 0.8;
  }
  
  /* Blue layer */
  .glitch img:nth-child(3) {
    transform: translate(-3px, 3px);
    filter: drop-shadow(3px 0 cyan);
    animation: glitch2 1.7s infinite steps(2, end);  /* updated */
    opacity: 0.8;
  }
  
  /* Animations */
  @keyframes glitch1 {
    0%   { clip-path: inset(12% 0 78% 0); }
    10%  { clip-path: inset(55% 0 20% 0); }
    20%  { clip-path: inset(25% 0 60% 0); }
    30%  { clip-path: inset(80% 0 5% 0); }
    45%  { clip-path: inset(40% 0 40% 0); }
    60%  { clip-path: inset(10% 0 85% 0); }
    75%  { clip-path: inset(65% 0 15% 0); }
    90%  { clip-path: inset(30% 0 50% 0); }
    100% { clip-path: inset(12% 0 78% 0); }
  }
  
  @keyframes glitch2 {
    0%   { clip-path: inset(70% 0 10% 0); }
    15%  { clip-path: inset(20% 0 65% 0); }
    25%  { clip-path: inset(50% 0 25% 0); }
    35%  { clip-path: inset(10% 0 85% 0); }
    50%  { clip-path: inset(60% 0 15% 0); }
    65%  { clip-path: inset(30% 0 55% 0); }
    80%  { clip-path: inset(75% 0 5% 0); }
    95%  { clip-path: inset(40% 0 35% 0); }
    100% { clip-path: inset(70% 0 10% 0); }
  }
</style>

</head>
<body>
<div class="glitch">
  <img src="r1.png" alt="logo">
  <img src="r1.png" alt="logo">
  <img src="r1.png" alt="logo">
</div>

<button class="neon-btn blue" onclick="window.open('index.html')">POSTERS</button>
<button class="neon-btn red" onclick="window.open('gallery.html')">PHOTOS</button>

</body>
</html>
